# Reame configuration — INI-style: [section] + key = value.
# Keys are read as "section.key". '#' and ';' start full-line comments.

[logging]
# debug | info | warn | error
level = info

[server]
host = 0.0.0.0
port = 8080
# HTTP worker threads (Boost.Asio). Keep small: inference owns the cores.
threads = 2
# Generation requests beyond this get 503 (inference is serialized anyway).
max_concurrent_requests = 10
timeout_seconds = 300
max_request_size_mb = 10
enable_cors = true
enable_metrics = true
enable_request_logging = true
# Bearer token required on /v1/* and /metrics when set (empty = no auth).
api_key =
# Model id reported by /v1/models and in responses.
model_id = reame-30b

[model]
# Target model: 30B GGUF, CPU-only inference.
path = models/model-30b.Q4_K_M.gguf
context_length = 8192
# Inference threads. VPS: 18 shared vCPU — leave headroom for server/OS.
threads = 14

[speculative]
# Speculative decoding (DSpark-style): small draft model proposes tokens,
# the target verifies them in a single batched pass.
enabled = true
# lookup = n-gram proposals from the prompt itself (default: needs no
#          second model; best for extraction/rewrite tasks that quote
#          their input)
# model  = a second, smaller GGUF proposes (requires draft_model_path)
mode = lookup
# Only used when mode = model:
#draft_model_path = models/draft-1.5b.Q8_0.gguf
# Tokens drafted per verification step.
draft_tokens = 8
# Draft acceptance threshold (0..1); below it, fall back to normal decoding.
min_acceptance = 0.3

[cache]
# KV-cache persistence on NVMe (DwarfStar4-style). Empty = disabled.
# Prompt prefixes and sessions are snapshotted (zstd-compressed, checksummed)
# and reused across restarts; LRU eviction keeps the budget.
directory = .reame-cache
max_size_mb = 20480
compress = true

[memory]
# Memory optimizations (DwarfStar-style).
# mmap the model file instead of loading it fully in RAM.
use_mmap = true
# Lock model pages in RAM (needs memlock limits on the VPS).
use_mlock = false
# KV-cache quantization: f16 | q8_0 | q4_0
kv_cache_type = q8_0
# Hard cap for total RSS in GiB (0 = unlimited). VPS has 96 GiB.
max_ram_gib = 80
