name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: sovranx-linux-x64
            deps: sudo apt-get update && sudo apt-get install -y
              build-essential cmake libboost-dev nlohmann-json3-dev
              libzstd-dev pkg-config
          - os: ubuntu-24.04-arm
            artifact: sovranx-linux-arm64
            deps: sudo apt-get update && sudo apt-get install -y
              build-essential cmake libboost-dev nlohmann-json3-dev
              libzstd-dev pkg-config
          - os: macos-14
            artifact: sovranx-darwin-arm64
            deps: brew install boost nlohmann-json zstd pkg-config

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: ${{ matrix.deps }}
      - name: Init submodule
        run: git submodule update --init --depth 1 third_party/llama.cpp
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSOVRANX_BUILD_TESTS=OFF
          cmake --build build --parallel 4
      - name: Package
        run: |
          mkdir -p dist
          cp build/src/sovranx dist/${{ matrix.artifact }}
          cd dist && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}.tar.gz
          # Runtime note shipped in the release body by the first job only.
          fail_on_unmatched_files: true
